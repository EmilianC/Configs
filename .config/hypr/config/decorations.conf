general {
	# https://wiki.hyprland.org/Configuring/Variables/#general

	gaps_in = 2
	gaps_out = 3

	# hyprlang if WINDOW_BORDERS
	border_size = 2

	col.active_border = $color_primary
	col.inactive_border = $color_tertiary
	# hyprlang endif
	# hyprlang if !WINDOW_BORDERS
	border_size = 0
	# hyprlang endif

	layout = dwindle # master|dwindle

	snap {
		# https://wiki.hyprland.org/Configuring/Variables/#snap

		enabled = true
	}
}

decoration {
	# https://wiki.hyprland.org/Configuring/Variables/#decoration

# hyprlang if WINDOW_TRANSPARENCY
	active_opacity = 0.97
	inactive_opacity = 0.9
# hyprlang endif

	rounding = 6

	blur {
		# https://wiki.hyprland.org/Configuring/Variables/#blur

		size = 5
		passes = 2 # more passes = more resource intensive.
		xray = true
		noise = 0.1
	}

	shadow {
		# https://wiki.hyprland.org/Configuring/Variables/#shadow

		enabled = false
	}
}

plugin {
	hyprbars {
		# https://github.com/hyprwm/hyprland-plugins/tree/main/hyprbars
# hyprlang if WINDOW_TITLE_BARS
		enabled = true
# hyprlang endif
# hyprlang if !WINDOW_TITLE_BARS
		enabled = false
# hyprlang endif

		bar_color = $color_secondary
		bar_height = 20
		bar_padding = 11
		bar_blur = true

		bar_title_enabled = true
		bar_text_size = 12
		bar_text_font = sans
		bar_text_align = left
		col.text = $color_bg_primary
		bar_buttons_alignment = right

		bar_part_of_window = true
		bar_precedence_over_border = true

		#                 BG_COLOR,    SIZE, ICON, ON-CLICK,                    COLOR
		hyprbars-button = rgb(f74040), 13,   󰖭,    hyprctl dispatch killactive, rgb(000000)

		icon_on_hover = false
		inactive_button_color = rgb(f74040) #f74040
	}
}
